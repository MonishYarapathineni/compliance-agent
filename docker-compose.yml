version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: compliance-agent:latest
    container_name: compliance-agent-api
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

